services:
  localstack:
    image: localstack/localstack:latest
    container_name: cloudpins-aws
    ports: 
      - "4566:4566"
    environment:
      - SERVICES=s3
      - AWS_ACCESS_KEY_ID=teste
      - AWS_SECRET_ACCESS_KEY=teste
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - localstack:/var/lib/localstack