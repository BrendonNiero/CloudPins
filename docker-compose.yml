services:
  localstack:
    image: localstack/localstack:latest
    ports: 
      - "4566:4566"
    environment:
      - SERVICES=s3
      - PERSISTENCE=1
      - AWS_ACCESS_KEY_ID=teste
      - AWS_SECRET_ACESS_KEY_ID=teste
      - AWS_DEFAULT_REGION=us-east-1
    container_name: cloudpins-aws
    volumes:
      - ./localstack:/var/lib/localstack